[alembic]
# Path to the alembic directory with env.py and version scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Timezone to use when generating migration timestamps (UTC recommended)
timezone = UTC

# Truncate the revision id to this length in filenames
truncate_slug_length = 40

# Set to true to run each migration in its own transaction
# (required for some DDL in PostgreSQL)
prepend_sys_path = .

# The SQLAlchemy URL is set programmatically in env.py from the
# DATABASE_URL environment variable.  This placeholder is only read if
# the env.py override is bypassed.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
